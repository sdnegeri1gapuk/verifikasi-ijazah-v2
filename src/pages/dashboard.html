<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard Admin</title>

    <link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="container">

    <h1>Dashboard</h1>

    <p>
        Total Dokumen :
        <span id="totalIjazah">0</span>
    </p>

    <hr><br>

<button id="btnTambah">
    ➕ Tambah Dokumen
</button>

<br><br>
<!-- Modal Tambah Ijazah -->

<div id="modalTambah" class="modal">

    <div class="modal-content">

        <h2>Tambah Dokumen</h2>
        <label>Jenis Dokumen</label>

        <select id="jenisDokumen">

            <option value="IJAZAH">Ijazah</option>

            <option value="TRANSKRIP">Transkrip Nilai</option>

            <option value="SKL">Surat Keterangan Lulus</option>

            <option value="SURAT_AKTIF">Surat Keterangan Aktif</option>

            <option value="SURAT_PINDAH">Surat Pindah</option>

            <option value="SERTIFIKAT">Sertifikat</option>

            <option value="LAINNYA">Lainnya</option>

        </select>
        <input id="kode" placeholder="Kode">

        <input id="nomor" placeholder="Nomor Dokumen">

        <input id="nama" placeholder="Nama Siswa">

        <div id="nisnGroup">

            <label>NISN</label>

            <input
                id="nisn"
                placeholder="NISN">

        </div>

        <input type="file" id="pdfFile" accept=".pdf">
        <div id="previewContainer">

            <canvas id="pdfCanvas"></canvas>

            <img
                id="qrPreview"
                src=""
                draggable="false">

        </div>
        <button id="simpanData">
            Simpan
        </button>

        <button id="tutupModal">
            Batal
        </button>

    </div>

</div>

    <table>

        <thead>

            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>NISN</th>
                <th>Nomor Dokumen</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>

        </thead>

        <tbody id="tbodyIjazah">

        </tbody>

    </table>

    <br>

    <button id="logoutBtn">
        Logout
    </button>

</div>

<script type="module" src="../js/dashboard.js"></script>
<input
    type="file"
    id="gantiPdfFile"
    accept="application/pdf"
    style="display:none;">
</body>

</html>
